# Documentation drift map.
#
# Purpose:
#   Map changed paths to shared rules/docs that may need review.
#   This file does not decide that docs must change. It only makes the
#   "should we check docs?" signal visible to agents and users.
#
#   The same path globs are mirrored in two on-demand loaders:
#   - .claude/rules/*.md `paths:` frontmatter (Claude auto-loads domain pointers)
#   - .codex/hooks/post_edit_domain_router.py (Codex injects domain pointers after edits)
#   When you change globs here, mirror the change in .claude/rules/.
#
# Precision rule:
#   Prefer directory-scoped globs over bare extension or substring globs.
#   A glob that matches most commits in this repo is noise, not signal —
#   tighten it during adapt-rules and whenever drift output gets noisy.
#
# Syntax:
#   - name: short label
#     paths:
#       - glob pattern matched against changed files
#     docs:
#       - repo-visible doc that should be reviewed
#     reason: why this signal matters
#
# Customize this file after installing the rules kit in a real project.

rules:
  - name: agent-contract
    paths:
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".agent/**"
      - ".agents/**"
      - ".claude/**"
      - ".codex/**"
    docs:
      - ".agent/index.md"
      - ".agent/doc-drift.md"
      - ".agent/skill-policy.md"
      - ".agent/tool-policy.md"
      - ".agent/rule-health.md"
    reason: "Agent workflow, memory, skill, hook, or tool policy changed."

  - name: command-contract
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "yarn.lock"
      - "package-lock.json"
      - "Project.swift"
      - "project.yml"
      - "Package.swift"
      - "Makefile"
      - "justfile"
      - "Gemfile"
      - "Podfile"
      - "pyproject.toml"
      - "Cargo.toml"
      - "go.mod"
      - "scripts/**"
      - ".github/workflows/**"
    docs:
      - ".agent/command-contract.md"
      - ".agent/domains/build-test.md"
      - ".agent/domains/release.md"
    reason: "Durable commands, scripts, CI, or project-generation workflow may have changed."

  - name: ui-copy
    paths:
      - "app/**"
      - "src/app/**"
      - "components/**"
      - "pages/**"
      - "layouts/**"
      - "views/**"
      - "screens/**"
      - "**/components/**"
      - "**/Components/**"
      - "**/views/**"
      - "**/Views/**"
      - "**/screens/**"
      - "**/Screens/**"
      - "**/pages/**"
      - "**/layouts/**"
    docs:
      - ".agent/domains/ui-copy.md"
      - ".agent/user-journeys.md"
    reason: "UI, interaction, layout, or user-visible copy may have changed."

  - name: localization
    paths:
      - "**/*.lproj/**"
      - "**/locales/**"
      - "**/i18n/**"
      - "**/translations/**"
      - "**/*.strings"
      - "**/*.stringsdict"
      - "**/*.xcstrings"
      - "**/*.arb"
      - "**/*.po"
      - "**/*.xliff"
    docs:
      - ".agent/domains/localization.md"
      - ".agent/domains/ui-copy.md"
    reason: "Supported strings, language behavior, or translation workflow may have changed."

  - name: data-sync
    paths:
      - "db/**"
      - "prisma/**"
      - "drizzle/**"
      - "supabase/migrations/**"
      - "**/models/**"
      - "**/Models/**"
      - "**/schema/**"
      - "**/Schema/**"
      - "**/migrations/**"
      - "**/Migrations/**"
      - "**/stores/**"
      - "**/Stores/**"
      - "**/*.sql"
      - "**/*.xcdatamodeld/**"
    docs:
      - ".agent/domains/data-sync.md"
      - ".agent/quality-gates.md"
    reason: "Data lifecycle, persistence, sync, backup, or destructive behavior may have changed."

  - name: build-test
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "yarn.lock"
      - "package-lock.json"
      - "Project.swift"
      - "project.yml"
      - "Package.swift"
      - "Makefile"
      - "justfile"
      - "Gemfile"
      - "Podfile"
      - "pyproject.toml"
      - "Cargo.toml"
      - "go.mod"
      - ".github/workflows/**"
      - "scripts/**"
      - "test/**"
      - "tests/**"
      - "**/__tests__/**"
      - "**/*Tests/**"
      - "**/*.test.*"
      - "**/*.spec.*"
    docs:
      - ".agent/domains/build-test.md"
      - ".agent/command-contract.md"
      - ".agent/verification-map.md"
    reason: "Build, test, CI, generated project, or local runtime workflow may have changed."

  - name: release
    paths:
      - ".github/workflows/**"
      - "fastlane/**"
      - "deploy/**"
      - "deployment/**"
      - "helm/**"
      - "terraform/**"
      - "Dockerfile"
      - "docker-compose*"
      - "ExportOptions.plist"
      - "**/*.entitlements"
      - "**/*Signing*"
      - ".releaserc*"
    docs:
      - ".agent/domains/release.md"
      - ".agent/workflows/release.md"
      - ".agent/tool-policy.md"
    reason: "Release, signing, deployment, store, or external operation workflow may have changed."

  - name: performance
    paths:
      - "perf/**"
      - "benchmarks/**"
      - "**/benchmarks/**"
      - "**/*Benchmark*"
      - "**/*Performance*"
    docs:
      - ".agent/domains/performance.md"
      - ".agent/verification-map.md"
    reason: "Performance-sensitive paths, metrics, or benchmark behavior may have changed."
